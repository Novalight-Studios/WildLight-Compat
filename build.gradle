plugins {
	id 'fabric-loom' version "${loom_version}"
	id 'maven-publish'
}

version = project.mod_version
group = project.maven_group

base {
	archivesName = project.archives_base_name
}

repositories {
	maven { url "https://api.modrinth.com/maven" }
	maven { url "https://maven.ladysnake.org/releases" }
	maven { url "https://maven.terraformersmc.com/" }
	maven { url "https://repo.u-team.info" }
	maven { url "https://maven.fzzyhmstrs.me" }
	maven { url "https://maven.kyrptonaught.dev" }
	maven { url "https://maven.wispforest.io" }
    mavenCentral()
}

loom {
	splitEnvironmentSourceSets()

	mods {
		"wildlight" {
			sourceSet sourceSets.client
		}
	}
}

dependencies {
	minecraft "com.mojang:minecraft:${project.minecraft_version}"
	mappings loom.officialMojangMappings()
	modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"

	modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"

    // Immersive Armors
    modCompileOnly "maven.modrinth:immersive-armors:${project.immersive_armors_version}"
    modRuntimeOnly "maven.modrinth:immersive-armors:${project.immersive_armors_version}"

	// Copper Age Backport
	modCompileOnly "maven.modrinth:backport-copper-age:${project.copper_age_backport_version}"
	modRuntimeOnly "maven.modrinth:backport-copper-age:${project.copper_age_backport_version}"

	// Deeper and Darker
	modImplementation "maven.modrinth:deeperdarker:${project.deeper_darker_version}"
	include modImplementation("net.kyrptonaught:customportalapi:${project.custom_portal_api_version}")
	modImplementation "io.wispforest:owo-lib:${project.owo_version}"

	// Subtle Effects
	modImplementation "maven.modrinth:subtle-effects:${project.subtle_effects_version}"
	modImplementation "me.fzzyhmstrs:fzzy_config:${project.fzzy_config_version}"

	// Soul Candles
	modImplementation "maven.modrinth:soul-candles:${project.soul_candles_version}"

    // Detail Armor Bar Compat
    modImplementation "maven.modrinth:detailab-compat:${project.detailab_compat_version}"
    modImplementation "maven.modrinth:detail-armor-bar:${project.detailab_version}"

	// Visual Overhaul
	modImplementation "maven.modrinth:visual-overhaul:${project.visualoverhaul_version}"
	modImplementation "maven.modrinth:midnightlib:${project.midnightlib_version}"

	// Useful Backpacks
	modImplementation "info.u-team:useful_backpacks-fabric-${project.minecraft_version}:${project.usefulbackpacks_version}"
	modImplementation "info.u-team:u_team_core-fabric-${project.minecraft_version}:${project.uteamcore_version}"
	modImplementation "dev.emi:trinkets:${project.trinkets_version}"
}

processClientResources {
	def replaceProperties = new HashMap<String, String>()

	project.properties.each {key, value ->
		if (value instanceof String) {
			replaceProperties.put((String) key, (String) value)
		}
		return
	}

	inputs.properties replaceProperties

	filesMatching('fabric.mod.json') {
		expand replaceProperties
	}
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 21
}

tasks.javadoc {
    source = sourceSets.client.allJava
}

java {
	withSourcesJar()
    withJavadocJar()

	sourceCompatibility = JavaVersion.VERSION_21
	targetCompatibility = JavaVersion.VERSION_21
}

jar {
	inputs.property "archivesName", project.base.archivesName

	from("LICENSE") {
		rename { "${it}_${inputs.properties.archivesName}"}
	}
}

tasks.withType(Javadoc).configureEach {
	enabled = false
}